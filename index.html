<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Podcast App</title>

  <link
    rel="stylesheet"
    href="./styles.css"
  >
</head>

<body>

  <header class="header">

  <div class="header-left">

    <div class="logo-circle"></div>

    <h1>PodcastApp</h1>

  </div>

  <div class="header-right">

    <span class="search-icon">⌕</span>

    <div class="profile-circle"></div>

  </div>

</header>

  <main>

    <section class="filters">

  <label for="genreFilter">
    Filter by:
  </label>

  <select id="genreFilter">
    <option value="all">
      All Genres
    </option>
  </select>

  <select id="sortFilter">

    <option value="recent">
      Recently Updated
    </option>

    <option value="popular">
      Most Popular
    </option>

    <option value="newest">
      Newest
    </option>

  </select>

</section>


</section>

    <section
      id="podcastGrid"
      class="podcast-grid"
    ></section>

  </main>

  <div
    id="modalOverlay"
    class="modal-overlay hidden"
  >

    <div class="modal">

      <button
        id="closeModal"
        class="close-button"
      >
        X
      </button>

      <div id="modalContent"></div>

    </div>

  </div>

  <script
    type="module"
    src="./index.js"
  ></script>

</body>
</html>
