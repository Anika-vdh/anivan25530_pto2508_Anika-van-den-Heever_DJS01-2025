<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Podcast App</title>

  <link
    rel="stylesheet"
    href="./styles.css"
  >
</head>

<body>

  <header class="header">
    <h1>Podcast App</h1>
  </header>

  <main>

    <section
      id="podcastGrid"
      class="podcast-grid"
    ></section>

  </main>

  <div
    id="modalOverlay"
    class="modal-overlay hidden"
  >

    <div class="modal">

      <button
        id="closeModal"
        class="close-button"
      >
        X
      </button>

      <div id="modalContent"></div>

    </div>

  </div>

  <script
    type="module"
    src="./index.js"
  ></script>

</body>
</html>
